<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex SangioSuba</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23cc0000' stroke='%23000' stroke-width='4'/%3E%3Ccircle cx='50' cy='50' r='48' fill='none' stroke='%23000' stroke-width='4'/%3E%3Crect x='2' y='46' width='96' height='8' fill='%23000'/%3E%3Ccircle cx='50' cy='50' r='12' fill='%23fff' stroke='%23000' stroke-width='4'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%23ddd'/%3E%3Cpath d='M2 50 Q2 4 50 4 Q98 4 98 50' fill='%23cc0000'/%3E%3Cpath d='M2 50 Q2 96 50 96 Q98 96 98 50' fill='%23fff'/%3E%3Crect x='2' y='46' width='96' height='8' fill='%23000'/%3E%3Ccircle cx='50' cy='50' r='12' fill='%23fff' stroke='%23000' stroke-width='4'/%3E%3Ccircle cx='50' cy='50' r='5' fill='%23ccc'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       CSS VARIABLES — palette ispirata a Pokémon Ruby/Sapphire GBA
    ============================================================ */
    :root {
      --bg:         #1a1a2e;
      --bg-mid:     #16213e;
      --bg-panel:   #0f3460;
      --red:        #e63946;
      --red-dark:   #9d0208;
      --gold:       #ffd700;
      --screen-bg:  #9bbc0f;
      --screen-mid: #8bac0f;
      --screen-dark:#306230;
      --white:      #e8f4f8;
      --gray:       #8899aa;

      /* Colori per tipo */
      --suba:       #e63946;
      --sangio:     #4895ef;
      --signorine:  #cc55ff;
      --outsider:   #2dc653;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Press Start 2P', cursive;
      background-color: var(--bg);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ============================================================
       SCHERMATA DI AVVIO
    ============================================================ */
    #bootScreen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      gap: 2rem;
      cursor: pointer;
    }

    #bootScreen.fade-out {
      animation: bootFade 0.8s ease forwards;
      pointer-events: none;
    }

    @keyframes bootFade { to { opacity: 0; } }

    .boot-logo {
      text-align: center;
      opacity: 1;
      font-family: 'Press Start 2P', monospace;
    }
    @keyframes bootAppear { to { opacity: 1; } }

    .boot-title {
      font-size: clamp(0.8rem, 4vw, 1.4rem);
      color: var(--gold);
      text-shadow: 0 0 20px var(--gold), 0 0 50px #ff9900;
      letter-spacing: 2px;
      line-height: 2.2;
      font-family: 'Press Start 2P', monospace;
    }
    .boot-subtitle {
      font-size: clamp(0.35rem, 1.5vw, 0.55rem);
      color: var(--gray);
      margin-top: 0.5rem;
      letter-spacing: 4px;
      font-family: 'Press Start 2P', monospace;
    }
    .boot-press {
      font-size: clamp(0.35rem, 1.2vw, 0.5rem);
      color: var(--white);
      animation: blink 1s steps(1) 1.5s infinite, bootAppear 0s 1.4s both;
      opacity: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .boot-bar {
      width: min(240px, 60vw);
      height: 10px;
      background: #111;
      border: 2px solid #333;
      border-radius: 2px;
      overflow: hidden;
      animation: bootAppear 0s 0.3s both;
      opacity: 0;
    }
    .boot-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red-dark), var(--red), var(--gold));
      animation: fillBar 1.8s ease 0.5s forwards;
    }
    @keyframes fillBar { to { width: 100%; } }

    .boot-copy {
      font-size: 0.3rem;
      color: #333;
      position: absolute;
      bottom: 1.5rem;
      letter-spacing: 1px;
      animation: bootAppear 0s 0.4s both;
      opacity: 0;
    }

    /* ============================================================
       SCANLINES — effetto schermo GBA sull'intera pagina
    ============================================================ */
    #app::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 500;
    }

    /* ============================================================
       HEADER — scocca Pokédex
    ============================================================ */
    header {
      background: linear-gradient(135deg, #aa0000 0%, #cc0000 35%, var(--red) 60%, #aa0000 100%);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.8rem;
      border-bottom: 4px solid #660000;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      position: relative;
      min-height: 64px;
    }

    .header-light {
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .header-light.big {
      width: 42px; height: 42px;
      background: radial-gradient(circle at 33% 33%, #aaeeff, #0077cc 70%);
      border: 3px solid #004488;
      box-shadow: 0 0 14px #00aaff88, inset 0 -2px 6px rgba(0,0,0,0.3);
    }
    .header-light.small { width: 13px; height: 13px; }
    .header-light.yellow { background: radial-gradient(circle at 33% 33%, #ffff99, #ffaa00); border: 2px solid #cc8800; }
    .header-light.green  { background: radial-gradient(circle at 33% 33%, #aaffaa, #00aa00); border: 2px solid #006600; }
    .header-light.reds   { background: radial-gradient(circle at 33% 33%, #ffaaaa, #cc2200); border: 2px solid #880000; }
    .header-lights-row   { display: flex; gap: 5px; align-items: center; position: relative; z-index: 1; }

    header h1 {
      position: absolute;
      left: 0; right: 0;
      text-align: center;
      font-size: clamp(0.45rem, 2.5vw, 0.85rem);
      color: var(--white);
      text-shadow: 2px 2px 0 #660000;
      letter-spacing: 1px;
      pointer-events: none;
    }

    /* ============================================================
       NAV — filtri
    ============================================================ */
    nav {
      background: var(--bg-mid);
      padding: 0.8rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      border-bottom: 2px solid #0a1628;
    }
    nav span {
      cursor: pointer;
      padding: 0.4rem 0.7rem;
      font-size: 0.4rem;
      border-radius: 3px;
      border: 2px solid transparent;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      user-select: none;
    }
    nav span[data-type="all"]       { background: #222; color: #aaa; border-color: #444; }
    nav span[data-type="suba"]      { background: rgba(230,57,70,0.15);  color: #ff8891; border-color: var(--suba); }
    nav span[data-type="sangio"]    { background: rgba(72,149,239,0.15); color: #90cbff; border-color: var(--sangio); }
    nav span[data-type="signorine"] { background: rgba(247,37,133,0.15); color: #ffaadd; border-color: var(--signorine); }
    nav span[data-type="outsider"]  { background: rgba(45,198,83,0.15);  color: #88ffaa; border-color: var(--outsider); }

    nav span.active-filter { filter: brightness(1.6); transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0,0,0,0.4); }
    nav span:hover:not(.active-filter) { filter: brightness(1.3); transform: translateY(-1px); }

    /* ============================================================
       SEARCH
    ============================================================ */
    .search-bar {
      text-align: center;
      padding: 0.9rem 1rem 0.4rem;
      background: var(--bg);
    }
    .search-bar input {
      font-family: 'Press Start 2P', cursive;
      padding: 0.6rem 1rem;
      width: min(80%, 400px);
      font-size: 0.45rem;
      background: var(--bg-mid);
      border: 2px solid #1e3a5f;
      color: var(--white);
      border-radius: 3px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(255,215,0,0.25);
    }
    .search-bar input::placeholder { color: #445566; }
    .search-counter {
      font-size: 0.32rem;
      color: var(--gray);
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }
    .search-counter span {
      color: var(--gold);
    }

    /* ============================================================
       LISTA POKEMON
    ============================================================ */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      padding: 1rem;
    }

    /* Transizione pagina */
    .container.page-exit {
      animation: pageExit 0.18s ease forwards;
    }
    .container.page-enter {
      animation: pageEnter 0.25s ease forwards;
    }
    @keyframes pageExit {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-20px); }
    }
    @keyframes pageEnter {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .poke-bar {
      background: linear-gradient(135deg, #1e2d4a, #243558);
      border: 2px solid #3a5a8a;
      border-left: 5px solid var(--type-color, #555);
      border-radius: 5px;
      width: 90%;
      max-width: 520px;
      padding: 0.9rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: slideIn 0.25s ease both;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .poke-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    @keyframes slideIn {
      from { transform: translateX(-16px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }

    .poke-bar[data-type="suba"]      { --type-color: var(--suba); }
    .poke-bar[data-type="sangio"]    { --type-color: var(--sangio); }
    .poke-bar[data-type="signorine"] { --type-color: var(--signorine); }
    .poke-bar[data-type="outsider"]  { --type-color: var(--outsider); }

    .poke-bar:hover {
      transform: translateX(5px) scale(1.01);
      box-shadow: -5px 0 18px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
      border-left-color: var(--type-color);
      border-color: var(--type-color);
    }

    .poke-info { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
    .poke-number { font-size: 0.4rem; color: var(--gray); }
    .poke-name   { font-size: clamp(0.5rem, 2vw, 0.72rem); color: var(--white); line-height: 1.4; }

    .poke-type-badge {
      font-size: 0.35rem;
      padding: 0.2rem 0.45rem;
      border-radius: 2px;
      display: inline-block;
      margin-top: 0.1rem;
      letter-spacing: 0.5px;
      width: fit-content;
      border: 1px solid var(--type-color, #555);
      color: var(--white);
      background: rgba(255,255,255,0.07);
    }

    .placeholder-warning {
      font-size: 0.32rem;
      color: #886600;
      margin-top: 0.1rem;
    }

    /* ===== SPRITE SHAKE/WIGGLE on hover ===== */
    .sprite-wrap {
      position: relative;
      width: 90px; height: 90px;
      flex-shrink: 0;
    }
    .sprite-wrap img {
      width: 100%; height: 100%;
      image-rendering: pixelated;
      transition: filter 0.2s ease;
      display: block;
    }
    .poke-bar:hover .sprite-wrap img {
      animation: spriteWiggle 0.5s ease infinite;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }
    @keyframes spriteWiggle {
      0%   { transform: rotate(0deg) translateX(0px); }
      15%  { transform: rotate(-6deg) translateX(-3px); }
      30%  { transform: rotate(6deg) translateX(3px); }
      45%  { transform: rotate(-4deg) translateX(-2px); }
      60%  { transform: rotate(4deg) translateX(2px); }
      75%  { transform: rotate(-2deg) translateX(-1px); }
      90%  { transform: rotate(2deg) translateX(1px); }
      100% { transform: rotate(0deg) translateX(0px); }
    }

    /* ============================================================
       PAGINAZIONE
    ============================================================ */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem;
    }
    .page-number {
      background: var(--bg-panel);
      color: var(--white);
      padding: 0.5rem 0.8rem;
      border: 2px solid #1e3a5f;
      cursor: pointer;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.45rem;
      border-radius: 3px;
      transition: all 0.15s;
    }
    .page-number:hover       { background: var(--red); border-color: var(--red); }
    .page-number.active      { background: var(--gold); color: #000; border-color: var(--gold); }

    /* ============================================================
       MODAL
    ============================================================ */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: var(--bg-mid);
      border: 3px solid var(--bg-panel);
      border-radius: 6px;
      width: 90%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
      animation: modalIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalIn {
      from { transform: scale(0.82) translateY(24px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }

    /* Stripe colorata in cima per tipo */
    .modal-type-stripe {
      height: 5px;
      width: 100%;
      transition: background 0.2s;
    }

    .modal-header {
      padding: 0.8rem 1rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-pokemon-id {
      font-size: 0.38rem;
      color: var(--gray);
      letter-spacing: 1px;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--gray);
      font-family: 'Press Start 2P', cursive;
      font-size: 0.65rem;
      cursor: pointer;
      transition: color 0.15s;
      line-height: 1;
    }
    .modal-close:hover { color: var(--red); }

    .modal-tabs {
      display: flex;
      gap: 0;
      margin: 0.8rem 1rem 0;
      border-bottom: 2px solid #1e3a5f;
    }
    .modal-tab {
      cursor: pointer;
      padding: 0.4rem 0.7rem;
      font-size: 0.38rem;
      color: var(--gray);
      transition: all 0.15s;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      letter-spacing: 0.5px;
    }
    .modal-tab:hover  { color: var(--white); }
    .modal-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    .modal-body { padding: 1rem; }
    .modal-body > div { display: none; }
    .modal-body > .active { display: block; }

    /* Schermo grigio retro per lo sprite */
    .sprite-screen {
      background: linear-gradient(145deg, #c8c8c8, #b0b0b0 60%, #989898);
      border: 3px solid #606060;
      border-radius: 4px;
      padding: 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 1rem;
      position: relative;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.25), inset 0 -1px 4px rgba(255,255,255,0.3), 0 2px 8px rgba(0,0,0,0.4);
    }
    /* Scanlines sullo schermo del modal */
    .sprite-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      border-radius: 2px;
    }

    #modalImage {
      width: 120px; height: 120px;
      image-rendering: pixelated;
      display: block;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
      animation: floatSprite 3s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes floatSprite {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-6px); }
    }

    #modalName {
      font-size: 0.58rem;
      color: var(--modal-accent, var(--white));
      text-align: center;
      margin-bottom: 0.8rem;
      letter-spacing: 1px;
      text-shadow: 0 0 12px var(--modal-accent, transparent);
    }
    #modalDescription {
      font-size: 0.45rem;
      color: #ccd6f6;
      line-height: 2.2;
      font-family: 'Press Start 2P', cursive;
    }

    .map-placeholder {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--gray);
      font-size: 0.45rem;
      line-height: 2.5;
    }
    #modalMap {
      width: 100%;
      border-radius: 4px;
      border: 2px solid var(--bg-panel);
    }
    #modalAudio {
      width: 100%;
      margin-top: 1rem;
    }

    .no-results {
      font-size: 0.5rem;
      color: var(--gray);
      text-align: center;
      padding: 3rem 1rem;
      line-height: 2.5;
    }
    .mossa-card {
      border: 2px solid var(--modal-accent, #555);
      border-radius: 4px;
      padding: 0.7rem 0.9rem;
      background: rgba(255,255,255,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mossa-nome {
      font-size: 0.42rem;
      color: var(--white);
      letter-spacing: 0.5px;
    }
    .mossa-tipo {
      font-size: 0.3rem;
      padding: 0.2rem 0.45rem;
      border-radius: 2px;
      border: 1px solid var(--modal-accent, #555);
      color: var(--modal-accent, #fff);
      background: rgba(255,255,255,0.06);
      letter-spacing: 0.5px;
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.32rem;
      color: #4a7aaa;
      letter-spacing: 2px;
      border-top: 1px solid #1e3a5f;
      margin-top: 0.5rem;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 520px) {
      /* Header - nascondi luci piccole, tieni solo blu */
      header {
        padding: 0.7rem 1rem;
        min-height: 52px;
      }
      header h1 {
        font-size: 0.42rem;
      }
      .header-light.big { width: 26px; height: 26px; flex-shrink: 0; }
      .header-lights-row { display: none; }

      /* Nav */
      nav { gap: 0.4rem; padding: 0.6rem; }
      nav span { font-size: 0.32rem; padding: 0.35rem 0.45rem; }

      /* Card */
      .poke-bar { padding: 0.7rem 0.8rem; gap: 0.5rem; }
      .poke-name { font-size: 0.5rem; }
      .poke-number { font-size: 0.35rem; }
      .poke-type-badge { font-size: 0.3rem; }
      .sprite-wrap { width: 68px; height: 68px; }

      /* Search */
      .search-bar input { width: 92%; font-size: 0.38rem; }
      .search-counter { font-size: 0.28rem; }

      /* Modal */
      .modal-content { width: 95%; }
      .modal-body { padding: 0.7rem; }
      #modalImage { width: 90px; height: 90px; }
      #modalName { font-size: 0.48rem; }
      #modalDescription { font-size: 0.38rem; line-height: 2; }
      .modal-tab { font-size: 0.32rem; padding: 0.35rem 0.5rem; }
      .modal-pokemon-id { font-size: 0.3rem; }

      /* Pagination */
      .page-number { padding: 0.4rem 0.6rem; font-size: 0.38rem; }
    }
  </style>
</head>
<body>

  <!-- BOOT SCREEN -->
  <div id="bootScreen">
    <div class="boot-logo">
      <div class="boot-title">POKÉDEX<br>SANGIOSUBA</div>
      <div class="boot-subtitle">SPECIAL EDITION</div>
    </div>
    <div class="boot-bar">
      <div class="boot-bar-fill"></div>
    </div>
    <div class="boot-press">STO CUCINANDO</div>
    <div class="boot-copy">© 2026 MRBIGARI KITCHEN · ALL RIGHTS RESERVED</div>
  </div>

  <!-- APP -->
  <div id="app">

    <header>
      <div class="header-light big"></div>
      <div class="header-lights-row">
        <div class="header-light small reds"></div>
        <div class="header-light small yellow"></div>
        <div class="header-light small green"></div>
      </div>
      <h1>POKÉDEX SANGIOSUBA</h1>
    </header>

    <nav id="typeFilter">
      <span data-type="all" class="active-filter">⊛ ALL</span>
      <span data-type="suba">🔥 SUBA</span>
      <span data-type="sangio">💧 SANGIO</span>
      <span data-type="signorine">❤ SIGNORINE</span>
      <span data-type="outsider">🌿 OUTSIDER</span>
    </nav>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="SEARCH NAME OR TYPE...">
      <div class="search-counter" id="searchCounter">
        <span id="counterFiltered">19</span> / <span id="counterTotal">19</span> POKÉMON
      </div>
    </div>

    <div class="container" id="pokeList"></div>
    <div class="pagination" id="pagination"></div>

  <script>

    function dismissBoot() {
      if (bootEl.classList.contains('fade-out')) return;
      bootEl.classList.add('fade-out');
      setTimeout(() => { bootEl.style.display = 'none'; }, 800);
    }

    setTimeout(dismissBoot, 2800);
    bootEl.addEventListener('click', dismissBoot);
    document.addEventListener('keydown', dismissBoot, { once: true });

      { id:  1, name: 'Vanacore', tabs: ['info', 'map', 'sound'],      type: 'outsider',  stats: { simpatia: 60, affidabilita: 70, forza: 50, astuzia: 65 }, mosse: [{ nome: 'MOSSA 1', tipo: 'outsider' }, { nome: 'MOSSA 2', tipo: 'outsider' }],  description: "Vanacore (o Vanaculo per gli amici) è un pokémon molto particolare. Un tempo lo si trovava ramingo per le zone di Roma centro con insolite sigarette 'alle erbe'. Da quando è migrato nel suo nuovo habitat si fa vedere sempre meno. Alcuni dicono sia nei suoi nidi a farmare aura, altri che oramai sia diventato un bel PokéBollito.",                                               img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/253.png', audio: 'vanacore.mp3',       map: 'vanacore.png' },

      { id: 13, name: 'Ciummellina', tabs: ['info', 'map', 'sound'],   type: 'signorine', stats: { simpatia: 88, affidabilita: 72, forza: 48, astuzia: 78 }, mosse: [{ nome: 'MOSSA 1', tipo: 'signorine' }, { nome: 'MOSSA 2', tipo: 'signorine' }], description: "Ciummelina è dotata di un instabile corredo genetico che muta in base all'habitat naturale in cui è integrata. A seconda del rapporto con lei, mostrerà atteggiamenti totalmente diversi tra loro, perciò guai a farla arrabbiare. Da diversi anni è sempre in compagnia del suo Machamp preferito, uno spettacolo vederli assieme.", img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png', audio: 'audio/eevee.mp3',    map: 'maps/eevee.png' },
      { id: 14, name: 'Turpe', tabs: ['info', 'map', 'sound'],         type: 'sangio',    stats: { simpatia: 75, affidabilita: 60, forza: 80, astuzia: 55 }, mosse: [{ nome: 'CALCETTO', tipo: 'sangio' }, { nome: 'ABBUFFATA', tipo: 'sangio' }],    description: "Turpe (o Luspa per gli amici) è un tipo molto vorace che adora mangiare: può consumare grandi quantità di cibo in una sola volta senza sfamarsi. Differisce dalla sua evoluzione, Maspa, per essere più attivo: tende a giocare a calcetto per polisportive degne di nota e per farlo si trasforma nel Guaje di Porto Alegre.", img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/446.png', audio: 'audio/turpe.mp3', map: 'maps/turpe.png' },

      { id: 17, name: 'Camilla', tabs: ['info', 'map', 'sound'],       type: 'signorine', stats: { simpatia: 86, affidabilita: 66, forza: 44, astuzia: 82 }, mosse: [{ nome: 'MOSSA 1', tipo: 'signorine' }, { nome: 'MOSSA 2', tipo: 'signorine' }], description: PLACEHOLDER,                                               img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/300.png', audio: 'camilla.mp3',        map: 'camilla.png' },
      { id: 18, name: 'Sandro Artale', tabs: ['info', 'map', 'sound'], type: 'suba',      stats: { simpatia: 72, affidabilita: 58, forza: 68, astuzia: 64 }, mosse: [{ nome: 'MOSSA 1', tipo: 'suba' }, { nome: 'MOSSA 2', tipo: 'suba' }],      description: "Si dice che Sandro Artale abbia l'animo di un pugile destinato al campionato mondiale. Questo pokemon ha uno spirito indomito e non demorde mai di fronte a nulla, neanche alle strette di mano. Negli ultimi anni ha riscoperto dolcezza e amore dopo aver incontrato una femmina di Houndoom.",                                               img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/107.png', audio: 'artale.mp3',         map: 'Cinecittà.png' },
      { id: 19, name: 'Asietta', tabs: ['info', 'map', 'sound'],       type: 'signorine', stats: { simpatia: 84, affidabilita: 69, forza: 46, astuzia: 79 }, mosse: [{ nome: 'MOSSA 1', tipo: 'signorine' }, { nome: 'MOSSA 2', tipo: 'signorine' }], description: PLACEHOLDER,                                               img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/229.png', audio: 'asietta.mp3',        map: 'Cinecittà.png' },

      { id: 21, name: 'Ciummello',     tabs: ['info', 'map', 'sound'], type: 'suba',      stats: { simpatia: 70, affidabilita: 70, forza: 70, astuzia: 70 }, mosse: [{ nome: 'MOSSA 1', tipo: 'suba' }, { nome: 'MOSSA 2', tipo: 'suba' }], description: "Ciummello combatte tutta la settimana per aiutare i colleghi a formarsi adeguatamente. Nei giorni di riposo, si reca in campagna per godersi un po' di spensieratezza con la sua Eevee. Alcuni studiosi sostengono sia un pokemon molto permaloso, ma il suo cuore tenero gli fa perdonare qualsiasi fragilità, capogruppo nato.", img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/68.png', audio: 'ciummello.mp3', map: 'ciummello.png' },
      { id: 22, name: 'Matilde',       tabs: ['info', 'map', 'sound'], type: 'signorine', stats: { simpatia: 70, affidabilita: 70, forza: 50, astuzia: 70 }, mosse: [{ nome: 'MOSSA 1', tipo: 'signorine' }, { nome: 'MOSSA 2', tipo: 'signorine' }], description: PLACEHOLDER, img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/134.png', audio: 'matilde.mp3', map: 'matilde.png' },
      { id: 23, name: 'Manuel',        tabs: ['info', 'map', 'sound'], type: 'outsider',  stats: { simpatia: 70, affidabilita: 70, forza: 70, astuzia: 70 }, mosse: [{ nome: 'MOSSA 1', tipo: 'outsider' }, { nome: 'MOSSA 2', tipo: 'outsider' }], description: "Nonostante le evidenti differenze, lui si crede un giaguaro e mostra un debole per le aquile. Un tempo smerciava capi d'abbigliamento dalla dubbia provenienza, oggi solca i cieli come assistente di volo. La sua vita sembra migliorata da quando è arrivata una Vaporeon nella sua vita, sembra anche meno rompiscatole ma resta un laziale irriducibile.", img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/310.png', audio: 'manuel.mp3', map: 'manuel.png' },
      { id: 24, name: 'Frapo',         tabs: ['info', 'map', 'sound'], type: 'signorine', stats: { simpatia: 70, affidabilita: 70, forza: 50, astuzia: 70 }, mosse: [{ nome: 'MOSSA 1', tipo: 'signorine' }, { nome: 'MOSSA 2', tipo: 'signorine' }], description: PLACEHOLDER, img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/319.png', audio: 'frapo.mp3', map: 'frapo.png' },
      { id: 25, name: 'Tabba',         tabs: ['info', 'map', 'sound'], type: 'outsider',  stats: { simpatia: 70, affidabilita: 70, forza: 70, astuzia: 70 }, mosse: [{ nome: 'MOSSA 1', tipo: 'outsider' }, { nome: 'MOSSA 2', tipo: 'outsider' }], description: "Tabba si è evoluto con l'esposizione al potere dell'amicizia. Di natura docile si mette sempre a disposizione del gruppo se chiamato in causa. Sebbene innocuo all'apparenza, quando cala la notte e iniziano le danze, i pokemon dell'altro sesso rimangono preda del suo charme irresistibile.", img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/181.png', audio: 'tabba.mp3', map: 'tabba.png' },
      { id: 26, name: 'Giuls',         tabs: ['info', 'map', 'sound'], type: 'signorine', stats: { simpatia: 70, affidabilita: 70, forza: 50, astuzia: 70 }, mosse: [{ nome: 'MOSSA 1', tipo: 'signorine' }, { nome: 'MOSSA 2', tipo: 'signorine' }], description: PLACEHOLDER, img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/220.png', audio: 'giuls.mp3', map: 'giuls.png' },
      { id: 27, name: 'Mimmo',         tabs: ['info', 'map', 'sound'], type: 'signorine', stats: { simpatia: 70, affidabilita: 70, forza: 50, astuzia: 70 }, mosse: [{ nome: 'MOSSA 1', tipo: 'signorine' }, { nome: 'MOSSA 2', tipo: 'signorine' }], description: PLACEHOLDER, img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/27.png', audio: 'mimmo.mp3', map: 'mimmo.png' },
    ];

    // ============================================================
    // STATO
    // ============================================================
    let currentPage = 1;
    const ITEMS_PER_PAGE = 4;
    let currentType   = 'all';
    let currentSearch = '';

    // ============================================================
    // RENDER
    // ============================================================
    function getFiltered() {
      const q = currentSearch.toLowerCase();
      return pokemons.filter(p =>
        (currentType === 'all' || p.type === currentType) &&
        (p.name.toLowerCase().includes(q) || p.type.toLowerCase().includes(q))
      );
    }

    function renderList() {
      const list = document.getElementById('pokeList');
      list.innerHTML = '';
      const filtered  = getFiltered();

      // Aggiorna contatore
      document.getElementById('counterFiltered').textContent = filtered.length;
      document.getElementById('counterTotal').textContent    = pokemons.length;

      const start     = (currentPage - 1) * ITEMS_PER_PAGE;
      const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

      if (pageItems.length === 0) {
        list.innerHTML = '<p class="no-results">NESSUN POKÉMON<br>TROVATO...</p>';
        renderPagination(0);
        return;
      }

      pageItems.forEach((p, i) => {
        const isPlaceholder = p.description === PLACEHOLDER;
        const div = document.createElement('div');
        div.className = 'poke-bar';
        div.dataset.type = p.type;
        div.style.animationDelay = `${i * 0.07}s`;
        div.innerHTML = `
          <div class="poke-info">
            <span class="poke-number">#${String(p.id).padStart(3,'0')}</span>
            <span class="poke-name">${p.name.toUpperCase()}</span>
            <span class="poke-type-badge">${p.type.toUpperCase()}</span>
            ${isPlaceholder ? '<span class="placeholder-warning">⚠ TODO</span>' : ''}
          </div>
          <div class="sprite-wrap">
            <img src="${p.img}" alt="${p.name}" loading="lazy" />
          </div>
        `;
        div.addEventListener('click', () => openModal(p));
        list.appendChild(div);
      });

      renderPagination(filtered.length);
    }

    function renderPagination(total) {
      const pages = Math.ceil(total / ITEMS_PER_PAGE);
      const pag   = document.getElementById('pagination');
      pag.innerHTML = '';
      for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-number' + (i === currentPage ? ' active' : '');
        btn.textContent = i;
        btn.addEventListener('click', () => goToPage(i));
        pag.appendChild(btn);
      }
    }

    function goToPage(num) {
      if (num === currentPage) return;
      const container = document.getElementById('pokeList');
      container.classList.add('page-exit');
      setTimeout(() => {
        container.classList.remove('page-exit');
        currentPage = num;
        renderList();
        container.classList.add('page-enter');
        container.addEventListener('animationend', () => container.classList.remove('page-enter'), { once: true });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 180);
    }

    // ============================================================
    // FILTRI & SEARCH
    // ============================================================
    document.getElementById('typeFilter').addEventListener('click', (e) => {
      const target = e.target.closest('span[data-type]');
      if (!target) return;
      document.querySelectorAll('#typeFilter span').forEach(s => s.classList.remove('active-filter'));
      target.classList.add('active-filter');
      currentType = target.dataset.type;
      currentPage = 1;
      renderList();
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearch = e.target.value;
      currentPage   = 1;
      renderList();
    });

    // ============================================================
    // MODAL
    // ============================================================
    function openModal(pokemon) {
      // Mostra solo i tab previsti per questo pokemon
      const activeTabs = pokemon.tabs || ['info', 'stats', 'mosse', 'map', 'sound'];
      const TAB_LABELS = { info: 'INFO', stats: 'STATS', mosse: 'MOSSE', map: 'MAP', sound: 'SOUND' };
      document.querySelectorAll('.modal-tab').forEach(t => {
        const show = activeTabs.includes(t.dataset.tab);
        t.style.display = show ? '' : 'none';
        t.classList.remove('active');
      });
      document.querySelectorAll('.modal-body > div').forEach(d => d.classList.remove('active'));
      // Attiva sempre il primo tab visibile (info)
      const firstTab = document.querySelector('.modal-tab[style=""]') ||
                       document.querySelector('.modal-tab:not([style*="none"])');
      if (firstTab) {
        firstTab.classList.add('active');
        document.getElementById(firstTab.dataset.tab + 'Tab').classList.add('active');
      }

      // Colore accent
      const accent = TYPE_COLORS[pokemon.type] || '#cc0000';
      document.getElementById('modalStripe').style.background = accent;

      // Popola
      document.getElementById('modalId').textContent          = `#${String(pokemon.id).padStart(3,'0')} · ${pokemon.type.toUpperCase()}`;
      document.getElementById('modalImage').src               = pokemon.img;
      document.getElementById('modalImage').alt               = pokemon.name;
      document.getElementById('modalName').textContent        = pokemon.name.toUpperCase();
      document.getElementById('modalDescription').textContent = pokemon.description;
      document.getElementById('modalAudio').src               = pokemon.audio;

      // Mappa
      const mapContent = document.getElementById('mapContent');
      if (pokemon.map) {
        mapContent.innerHTML = `
          <img id="modalMap" src="${pokemon.map}" alt="Mappa ${pokemon.name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
          <div class="map-placeholder" style="display:none;">🗺️ MAPPA NON<br>DISPONIBILE</div>`;
      } else {
        mapContent.innerHTML = `<div class="map-placeholder">🗺️ MAPPA NON<br>DISPONIBILE</div>`;
      }
      document.getElementById('pokeModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('pokeModal').style.display = 'none';
      document.getElementById('modalAudio').pause();
    }

    document.getElementById('pokeModal').addEventListener('click', (e) => {
      if (e.target.id === 'pokeModal') closeModal();
    });
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    document.querySelectorAll('.modal-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.modal-body > div').forEach(d => d.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Tab').classList.add('active');
      });
    });

    // ============================================================
    // INIT
    // ============================================================
    renderList();
  </script>
</body>
</html>
